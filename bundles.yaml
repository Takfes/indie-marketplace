# =============================================================================
# bundles.yaml — indie marketplace configuration
# =============================================================================
# Single source of truth for what goes into each plugin.
#
# plugin.source values:
#   (omitted) — built locally from skills/ entries below
#   external  — third-party plugin repo; referenced in marketplace.json only,
#               never built locally. Fields: url, description, version.
#
# skill.source values (for locally-built plugins only):
#   local     — skill lives in skills/<name>/ in this repo (you own it)
#   community — fetched from a git repo at build time
#               repo: git URL to clone
#               path: subdirectory inside the repo (defaults to skill name)
#
# To add a skill:          add an entry under the plugin's skills list, run build.py
# To add a local plugin:   add a new block under plugins (no source:), run build.py
# To add external plugin:  add a block with source: external + url:, run build.py
# =============================================================================

marketplace:
  name: indie-marketplace
  description: Personal AI skills marketplace
  owner:
    name: Takis Fessas
    url: https://github.com/Takfes

plugins:
  # ---------------------------------------------------------------------------
  # provision — AI toolkit meta-skills
  # Skills for managing, creating, and distributing other skills and agents.
  # ---------------------------------------------------------------------------
  - name: provision
    description: AI toolkit provisioning and meta-skills
    version: "0.1.0"
    color: "#1a1a1a"
    skills:
      # Custom skills (source of truth is skills/ in this repo)
      - name: skill-bundler
        source: local

      - name: skill-downloader
        source: local

      # Community skills (git-cloned on make fetch / make fetch-build)
      - name: skill-creator
        source: community
        repo: "https://github.com/anthropics/skills"
        path: "skill-creator"

      - name: find-skills
        source: community
        repo: "https://github.com/vercel-labs/skills"
        path: "find-skills"

      - name: agent-development
        source: community
        repo: "https://github.com/anthropics/claude-code"
        path: "Agent Development"
