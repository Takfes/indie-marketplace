# =============================================================================
# bundles.yaml — indie marketplace configuration
# =============================================================================
# Single source of truth for what goes into each plugin.
#
# plugin.source values:
#   (omitted) — built locally from skills/ entries below
#   external  — third-party plugin repo; referenced in marketplace.json only,
#               never built locally. Fields: url, description, version.
#
# skill.source values (for locally-built plugins only):
#   local     — skill lives in skills/<name>/ in this repo (you own it)
#   community — fetched from a git repo at build time
#               repo: git URL to clone
#               path: subdirectory inside the repo (defaults to skill name).
#                     End path in "/*" (or use "*" alone for the repo root)
#                     to fetch every skill directory found directly under
#                     it as its own skill, instead of naming one explicitly.
#                     `name` becomes just a log label for these entries.
#
# plugin.hooks (optional, top-level sibling of `skills:`):
#   Same idea as a community skill, but fetches a hooks/ directory verbatim
#   instead of a skill. Fields: source: community, repo:, path: (defaults
#   to "hooks"). Refreshed by the same make fetch / make fetch-build run as
#   the plugin's skills — no separate command.
#
# To add a skill:          add an entry under the plugin's skills list, run build.py
# To add a local plugin:   add a new block under plugins (no source:), run build.py
# To add external plugin:  add a block with source: external + url:, run build.py
# =============================================================================

marketplace:
  name: indie-marketplace
  description: Personal AI skills marketplace
  owner:
    name: Takis Fessas
    url: https://github.com/Takfes

plugins:
  # ---------------------------------------------------------------------------
  # provision — AI toolkit meta-skills
  # Skills for managing, creating, and distributing other skills and agents.
  # ---------------------------------------------------------------------------
  - name: provision
    description: AI toolkit provisioning and meta-skills
    version: "0.1.0"
    color: "#1a1a1a"
    skills:
      # Custom skills (source of truth is skills/ in this repo)
      - name: skill-bundler
        source: local

      - name: skill-downloader
        source: local

      - name: onboard-project
        source: local

      # Community skills (git-cloned on make fetch / make fetch-build)
      - name: skill-creator
        source: community
        repo: "https://github.com/anthropics/skills"
        path: "skills/skill-creator"

      - name: find-skills
        source: community
        repo: "https://github.com/vercel-labs/skills"
        path: "skills/find-skills"

      - name: agent-development
        source: community
        repo: "https://github.com/anthropics/claude-code"
        path: "plugins/plugin-dev/skills/agent-development"

  # ---------------------------------------------------------------------------
  # python — Python development skills
  # ---------------------------------------------------------------------------
  - name: python
    description: Python development, packaging, testing, and refactoring skills
    version: "0.1.0"
    skills:
      - name: python-packaging
        source: community
        repo: "https://github.com/wshobson/agents"
        path: "plugins/python-development/skills/python-packaging"

      - name: python-performance-optimization
        source: community
        repo: "https://github.com/wshobson/agents"
        path: "plugins/python-development/skills/python-performance-optimization"

      - name: python-refactor
        source: community
        repo: "https://github.com/acaprino/alfio-claude-plugins"
        path: "plugins/python-development/skills/python-refactor"

      - name: python-simplifier
        source: community
        repo: "https://github.com/charlesmsiegel/tg"
        path: ".claude/skills/python-simplifier"

      - name: python-testing-patterns
        source: community
        repo: "https://github.com/wshobson/agents"
        path: "plugins/python-development/skills/python-testing-patterns"

      - name: uv-package-manager
        source: community
        repo: "https://github.com/wshobson/agents"
        path: "plugins/python-development/skills/uv-package-manager"

  # ---------------------------------------------------------------------------
  # steering — thinking, planning, and ideation skills
  # A mix of custom skills and community-sourced skills for structured thinking,
  # planning, and decision-making.
  # ---------------------------------------------------------------------------
  - name: steering
    description: Thinking, planning, and ideation skills — custom and community-sourced
    version: "0.1.0"
    skills:
      # Custom skills (source of truth is skills/ in this repo)
      - name: clarity
        source: local

      - name: devils-advocate
        source: local

      - name: plan-and-critique
        source: local

      # Community skills (git-cloned on make fetch / make fetch-build)
      - name: llm-council
        source: community
        repo: "https://github.com/aiwithremy/claude-skills-llm-council"
        path: "."

      - name: prd
        source: community
        repo: "https://github.com/github/awesome-copilot"
        path: "skills/prd"

      - name: claude-handoff
        source: community
        repo: "https://github.com/mattpocock/skills"
        path: "skills/in-progress/claude-handoff"

      - name: grill-me
        source: community
        repo: "https://github.com/mattpocock/skills"
        path: "skills/productivity/grill-me"

      - name: grilling
        source: community
        repo: "https://github.com/mattpocock/skills"
        path: "skills/productivity/grilling"

      - name: handoff
        source: community
        repo: "https://github.com/mattpocock/skills"
        path: "skills/productivity/handoff"

      - name: loop-me
        source: community
        repo: "https://github.com/mattpocock/skills"
        path: "skills/in-progress/loop-me"

  # ---------------------------------------------------------------------------
  # mattpocock — Matt Pocock's engineering / spec-driven-development skills
  # ---------------------------------------------------------------------------
  - name: mattpocock
    description: Matt Pocock's engineering skills — spec-driven development, TDD, code review, architecture
    version: "0.1.0"
    skills:
      # Wildcard group entry: fetches every skill directory found directly
      # under skills/engineering/ in one clone (see bundles.yaml header).
      - name: mattpocock-engineering
        source: community
        repo: "https://github.com/mattpocock/skills"
        path: "skills/engineering/*"

  # ---------------------------------------------------------------------------
  # office — Anthropic's document-format skills for creating and editing
  # Office/PDF documents (docx, pdf, pptx, xlsx).
  # ---------------------------------------------------------------------------
  - name: office
    description: Create and edit Office documents — docx, pdf, pptx, and xlsx
    version: "0.1.0"
    skills:
      - name: docx
        source: community
        repo: "https://github.com/anthropics/skills"
        path: "skills/docx"

      - name: pdf
        source: community
        repo: "https://github.com/anthropics/skills"
        path: "skills/pdf"

      - name: pptx
        source: community
        repo: "https://github.com/anthropics/skills"
        path: "skills/pptx"

      - name: xlsx
        source: community
        repo: "https://github.com/anthropics/skills"
        path: "skills/xlsx"

  # ---------------------------------------------------------------------------
  # superpowers — obra's methodology skills library (TDD, systematic
  # debugging, brainstorming, code review, plans, git worktrees, ...) plus
  # its SessionStart hook, which injects the 'using-superpowers' skill into
  # every session/clear/compact, pushing Claude to check for a matching
  # skill before responding. Both skills and hooks/ are fetched verbatim
  # from upstream — no hand-maintained copies.
  # ---------------------------------------------------------------------------
  - name: superpowers
    description: obra's methodology skills (TDD, debugging, brainstorming, code review, plans) with session-start skill-enforcement hook
    version: "0.1.0"
    hooks:
      source: community
      repo: "https://github.com/obra/superpowers"
      path: "hooks"
    skills:
      - name: obra-superpowers
        source: community
        repo: "https://github.com/obra/superpowers"
        path: "skills/*"

  # ---------------------------------------------------------------------------
  # reflexes — event-driven hooks reacting to Claude Code session lifecycle
  # Hooks-only plugin: no skills to fetch/build. hooks/ and scripts/ are
  # maintained by hand, not generated by build.py.
  # ---------------------------------------------------------------------------
  - name: reflexes
    description: Event-driven hooks that react to Claude Code session lifecycle events
    version: "0.1.0"
